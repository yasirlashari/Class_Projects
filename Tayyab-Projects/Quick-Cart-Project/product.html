<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Cart - Products</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>

  <nav class="navbar">
    <div class="logo">⚡ QuickCart</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="product.html" class="active">Products</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <button class="cart-icon-btn" onclick="toggleCart()">
      🛒 Cart <span class="cart-badge" id="cartBadge">0</span>
    </button>
  </nav>

  
  <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
  <div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h2>🛒 Your Cart</h2>
      <button class="close-cart" onclick="toggleCart()">✕</button>
    </div>
    <div class="cart-body" id="cartBody">
      <div class="cart-empty" id="cartEmpty">
        <p>😕 Cart khali hai!</p>
        <span>Koi product add karo</span>
      </div>
    </div>
    <div class="cart-footer" id="cartFooter" style="display:none;">
      <div class="cart-total-row">
        <span>Total:</span>
        <strong id="cartTotal">$0</strong>
      </div>
      <button class="btn-whatsapp" onclick="orderOnWhatsApp()">
        📲 WhatsApp par Order karo
      </button>
      <button class="btn-clear" onclick="clearCart()">🗑️ Cart Clear karo</button>
    </div>
  </div>

  
  <div class="page-header">
    <h1>🛍️ All Products</h1>
    <input type="text" id="searchBox" placeholder="🔍 Product search karo..." oninput="filterProducts()" />
  </div>

  <main class="products-page">
    <div class="products-container" id="allProductsGrid"></div>
    <p class="no-results" id="noResults" style="display:none;">❌ Koi product nahi mila.</p>
  </main>

  <footer class="footer">
    <p>© 2025 QuickCart — Made with ❤️</p>
  </footer>

  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
  <script>
    renderProducts('allProductsGrid', products);
    updateCartUI();

    function filterProducts() {
      const q = document.getElementById('searchBox').value.toLowerCase();
      const filtered = products.filter(p => p.name.toLowerCase().includes(q));
      renderProducts('allProductsGrid', filtered);
      document.getElementById('noResults').style.display = filtered.length === 0 ? 'block' : 'none';
    }
  </script>
</body>
</html>
